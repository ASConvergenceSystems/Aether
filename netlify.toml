[build]
  functions = "netlify/functions"
  publish   = "."

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "GITHUB_TOKEN,GITHUB_OWNER,GITHUB_REPO,GITHUB_BRANCH"

# Route /register to the function
[[redirects]]
  from   = "/register"
  to     = "/.netlify/functions/register"
  status = 200

# Route /verify to the function
[[redirects]]
  from   = "/verify"
  to     = "/.netlify/functions/verify"
  status = 200

# Route /respond to the function
[[redirects]]
  from   = "/respond"
  to     = "/.netlify/functions/respond"
  status = 200

# Route /proxy-register to the function
[[redirects]]
  from   = "/proxy-register"
  to     = "/.netlify/functions/proxy-register"
  status = 200

# Route /inbox/* to the function
[[redirects]]
  from   = "/inbox/*"
  to     = "/.netlify/functions/inbox"
  status = 200

[functions]
  node_bundler = "esbuild"

# Security headers for the site
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "no-referrer"

# CORS for machine-readable endpoints
[[headers]]
  for = "/aether.json"
  [headers.values]
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/agent.json"
  [headers.values]
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/aether-registry.json"
  [headers.values]
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/register"
  [headers.values]
    Access-Control-Allow-Origin  = "*"
    Access-Control-Allow-Methods = "POST, OPTIONS"
